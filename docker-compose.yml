services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-etl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-etlpassword}
      POSTGRES_DB: ${POSTGRES_DB:-invoices}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-etl} -d ${POSTGRES_DB:-invoices}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
